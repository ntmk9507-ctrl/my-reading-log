<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>読書メモ Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { --primary: #5e72e4; --background-color: #f4f7f9; }
        body { background-color: var(--background-color) !important; color: #333 !important; padding: 20px; font-size: 14px; }
        input, textarea, select, option { background-color: #ffffff !important; color: #333 !important; border-color: #ccc !important; }
        .container { max-width: 600px; }
        .hidden { display: none; }
        .book-card { background: white !important; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid var(--primary); color: #333; }
        .flex-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .manual-entry { background: #e9ecef; padding: 15px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<main class="container">
    <header><h3 style="text-align: center;">📚 読書メモ</h3></header>

    <section id="search-section">
        <label>本を選択またはISBN入力</label>
        <select id="book-history" onchange="selectFromHistory()">
            <option value="">-- 最近読んだ本から選ぶ --</option>
        </select>
        <div class="flex-row" style="margin-top:10px;">
            <input type="number" id="isbn" placeholder="ISBN 978..." pattern="\d*">
            <button onclick="searchBook()">検索</button>
        </div>
        <div style="text-align: center;">
            <a href="#" onclick="toggleManualEntry(true)" style="font-size: 0.8rem;">見つからないので直接入力する</a>
        </div>
    </section>

    <section id="manual-section" class="hidden manual-entry">
        <h5>手動で本の情報を入力</h5>
        <label>タイトル *</label>
        <input type="text" id="manual-title" placeholder="本のタイトル">
        <label>著者</label>
        <input type="text" id="manual-author" placeholder="著者名">
        <label>ISBN (任意)</label>
        <input type="number" id="manual-isbn" placeholder="978...">
        <div class="flex-row">
            <button onclick="setManualBook()">この内容で決定</button>
            <button class="outline secondary" onclick="toggleManualEntry(false)">キャンセル</button>
        </div>
    </section>

    <section id="active-book" class="hidden">
        <div class="book-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap:10px;">
                <div style="flex: 1;">
                    <strong id="display-title">タイトル</strong><br>
                    <span id="display-author" style="font-size: 0.8rem; color: #666;">著者</span>
                </div>
                <div style="width: 130px;">
                    <select id="category" style="margin-bottom: 5px; font-size: 0.7rem;"></select>
                    <button onclick="addNewCategory()" class="outline" style="font-size: 0.6rem; padding: 2px; width: 100%;">＋カテゴリ追加</button>
                </div>
            </div>
            <button onclick="resetBook()" class="outline secondary" style="font-size: 0.6rem; padding: 2px 5px; margin-top: 10px; width: auto;">本を変更</button>
        </div>

        <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div style="margin-bottom: 15px;">
                <label for="page">ページ</label>
                <input type="number" id="page" placeholder="p.">
            </div>
            <label for="memo">メモ</label>
            <textarea id="memo" rows="4" placeholder="気づきや引用を入力..."></textarea>
            <label for="photo">📸 写真を撮影 (任意)</label>
            <input type="file" id="photo" accept="image/*" capture="environment" style="font-size: 0.8rem;">
            <button id="submit-btn" onclick="sendMemo()">Notionへ送信</button>
        </div>
    </section>
</main>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbx6ZFFviKYGj6a9DnYbDuJLYsCG4jVN5_QN-lEeTcbhbZ01hP8k-bfuFU43wAV6DnU/exec";
    
    let currentBook = null;
    let history = JSON.parse(localStorage.getItem('bookHistory') || '[]');
    let categories = JSON.parse(localStorage.getItem('myCategories') || '["仕事術", "心理学", "教養"]');

    window.onload = () => { updateHistoryDropdown(); renderCategories(); };

    function renderCategories() {
        const select = document.getElementById('category');
        if(!select) return;
        select.innerHTML = '';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            select.appendChild(opt);
        });
        const otherOpt = document.createElement('option');
        otherOpt.value = 'その他'; otherOpt.innerText = 'その他';
        select.appendChild(otherOpt);
    }

    function addNewCategory() {
        const newCat = prompt("新しいカテゴリ名を入力してください");
        if (newCat && !categories.includes(newCat) && newCat !== 'その他') {
            categories.push(newCat);
            localStorage.setItem('myCategories', JSON.stringify(categories));
            renderCategories();
            document.getElementById('category').value = newCat;
        }
    }

    function updateHistoryDropdown() {
        const dropdown = document.getElementById('book-history');
        dropdown.innerHTML = '<option value="">-- 最近読んだ本から選ぶ --</option>';
        history.forEach((book, index) => {
            const opt = document.createElement('option');
            opt.value = index; opt.innerText = book.title;
            dropdown.appendChild(opt);
        });
    }

    function selectFromHistory() {
        const idx = document.getElementById('book-history').value;
        if (idx !== "") { currentBook = history[idx]; showActiveBook(); }
    }

    // 手動入力フォームの表示切り替え
    function toggleManualEntry(show) {
        document.getElementById('manual-section').classList.toggle('hidden', !show);
        document.getElementById('search-section').classList.toggle('hidden', show);
        if(show) {
            document.getElementById('manual-isbn').value = document.getElementById('isbn').value;
        }
    }

    // 手動入力された値をセット
    function setManualBook() {
        const title = document.getElementById('manual-title').value.trim();
        const author = document.getElementById('manual-author').value.trim() || "不明";
        const isbn = document.getElementById('manual-isbn').value.trim() || "なし";

        if (!title) { alert("タイトルは必須です"); return; }

        currentBook = { title: title, author: author, isbn: isbn };
        saveToHistory(currentBook);
        toggleManualEntry(false);
        showActiveBook();
    }

    async function searchBook() {
        const isbn = document.getElementById('isbn').value.trim();
        if (!isbn) return;
        try {
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await res.json();
            if (data.items) {
                const info = data.items[0].volumeInfo;
                currentBook = { title: info.title, author: info.authors?.join(', ') || '不明', isbn: isbn };
                saveToHistory(currentBook); showActiveBook();
            } else { 
                if(confirm("本が見つかりませんでした。手動で入力しますか？")) {
                    toggleManualEntry(true);
                }
            }
        } catch (e) { alert("エラーが発生しました"); }
    }

    function saveToHistory(book) {
        // 同じタイトルの本があれば履歴から削除して最新にする
        history = history.filter(h => h.title !== book.title);
        history.unshift(book);
        if (history.length > 10) history.pop();
        localStorage.setItem('bookHistory', JSON.stringify(history));
        updateHistoryDropdown();
    }

    function showActiveBook() {
        document.getElementById('display-title').innerText = currentBook.title;
        document.getElementById('display-author').innerText = currentBook.author;
        document.getElementById('search-section').classList.add('hidden');
        document.getElementById('manual-section').classList.add('hidden');
        document.getElementById('active-book').classList.remove('hidden');
    }

    function resetBook() {
        document.getElementById('search-section').classList.remove('hidden');
        document.getElementById('active-book').classList.add('hidden');
    }

    async function sendMemo() {
        const btn = document.getElementById('submit-btn');
        const memo = document.getElementById('memo').value;
        const page = document.getElementById('page').value;
        const photoFile = document.getElementById('photo').files[0];

        if (!memo && !photoFile) { alert("内容を入力してください"); return; }

        btn.disabled = true;
        btn.innerText = "送信中...";

        let photoData = null;
        if (photoFile) {
            const reader = new FileReader();
            photoData = await new Promise(resolve => {
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(photoFile);
            });
        }

        const payload = {
            title: currentBook.title,
            author: currentBook.author,
            isbn: currentBook.isbn,
            category: document.getElementById('category').value,
            page: page,
            memo: memo,
            photo: photoData
        };

        try {
            await fetch(gasUrl, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            alert("Notionへ送信しました！");
            document.getElementById('memo').value = "";
            document.getElementById('page').value = "";
            document.getElementById('photo').value = "";
        } catch (e) {
            alert("送信エラーが発生しました。");
        } finally {
            btn.disabled = false;
            btn.innerText = "Notionへ送信";
        }
    }
</script>
</body>
</html>
